<!DOCTYPE html>
<html lang="es" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes — Byte Wizzard Demo Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* LANG SWITCHER */
    .lang-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 4px;
      z-index: 1000;
    }
    .lang-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      background: #0d0d14;
      border: 1px solid #2a2a3e;
      color: #666;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: #00d488; color: #00d488; }
    .lang-btn.active { background: #00d488; color: #0a0a0f; border-color: #00d488; }

    .chat-container {
      width: 100%;
      max-width: 600px;
      height: min(90vh, 700px);
      background: #0d0d14;
      border: 1px solid #1a1a2e;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── HEADER ─── */
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d488, #00aaff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .chat-header .info { flex: 1; }
    .chat-header .name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #e0e0e0;
    }
    .chat-header .status {
      font-size: 0.65rem;
      color: #00d488;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chat-header .status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #00d488;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .chat-header .back-link {
      font-size: 0.7rem;
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }
    .chat-header .back-link:hover { color: #00d488; }

    /* ─── MESSAGES ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px; }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.bot {
      align-self: flex-start;
      background: #13131e;
      border: 1px solid #1a1a2e;
      color: #ccc;
    }
    .msg.bot .msg-label {
      font-size: 0.6rem;
      color: #00d488;
      margin-bottom: 4px;
      letter-spacing: 0.1em;
    }
    .msg.bot strong { color: #00d488; }
    .msg.bot em { color: #888; font-style: normal; }
    .msg.bot ul { margin: 6px 0; padding-left: 16px; }
    .msg.bot li { margin: 2px 0; }
    .msg.bot hr {
      border: none;
      border-top: 1px solid #1a1a2e;
      margin: 10px 0;
    }
    .msg.bot .product-ref {
      display: inline-block;
      font-size: 0.75rem;
      color: #00aaff;
      background: #0d0d14;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
      padding: 2px 8px;
      margin: 2px 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .msg.bot .product-ref:hover {
      border-color: #00d488;
      color: #00d488;
    }

    .msg.user {
      align-self: flex-end;
      background: #00d488;
      color: #0a0a0f;
      font-weight: 500;
    }

    .msg.typing {
      align-self: flex-start;
      background: transparent;
      border: none;
      display: flex;
      gap: 4px;
      padding: 8px 14px;
    }
    .msg.typing span {
      width: 6px;
      height: 6px;
      background: #555;
      border-radius: 50%;
      animation: typing 1.4s ease-in-out infinite;
    }
    .msg.typing span:nth-child(2) { animation-delay: 0.2s; }
    .msg.typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ─── SUGGESTIONS ─── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 20px 8px;
    }
    .suggestions button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 6px 12px;
      background: #13131e;
      border: 1px solid #1a1a2e;
      border-radius: 16px;
      color: #777;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestions button:hover {
      border-color: #00d488;
      color: #00d488;
      background: #0d0d14;
    }

    /* ─── INPUT ─── */
    .input-area {
      padding: 12px 20px;
      border-top: 1px solid #1a1a2e;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-area .prompt {
      font-size: 0.8rem;
      color: #00d488;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #e0e0e0;
    }
    .input-area input::placeholder { color: #444; }
    .input-area button {
      background: #00d488;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #0a0a0f;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .input-area button:hover { background: #00e899; }
    .input-area button:disabled { opacity: 0.3; cursor: not-allowed; }

    @media (max-width: 480px) {
      .chat-container { height: 100vh; border-radius: 0; border: none; }
      body { padding: 0; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<div class="lang-switcher">
  <button class="lang-btn" data-lang="es" onclick="I18N.setLang('es')">ES</button>
  <button class="lang-btn" data-lang="en" onclick="I18N.setLang('en')">EN</button>
  <button class="lang-btn" data-lang="pt" onclick="I18N.setLang('pt')">PT</button>
</div>

<div class="chat-container">
  <!-- HEADER -->
  <div class="chat-header">
    <div class="avatar">⚡</div>
    <div class="info">
      <div class="name" data-i18n="hermesDemo.header.name">Hermes</div>
      <div class="status" data-i18n="hermesDemo.header.status">Byte Wizzard — Demo Bot</div>
    </div>
    <a href="../../index.html" class="back-link" data-i18n="hermesDemo.backLink">← Back</a>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- SUGGESTIONS -->
  <div class="suggestions" id="suggestions"></div>

  <!-- INPUT -->
  <div class="input-area">
    <span class="prompt">$</span>
    <input type="text" id="input" placeholder="Ask about Byte Wizzard..." autofocus>
    <button id="send">Send</button>
  </div>
</div>

<script src="../../assets/i18n.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// i18n helper
// ═══════════════════════════════════════════════════════════════

function __(key) {
  const lang = window.__lang || I18N.currentLang || 'es';
  return key.split('.').reduce((o, k) => o?.[k], I18N.getLocale(lang));
}

// ═══════════════════════════════════════════════════════════════
// KNOWLEDGE BASE — built from translations
// ═══════════════════════════════════════════════════════════════

function buildKB(langCode) {
  const locale = I18N.getLocale(langCode);
  const demo = locale.hermesDemo;
  if (!demo || !demo.kb) return [];
  return demo.kb.map(entry => ({
    ...entry,
    response: () => entry.response,
  }));
}

function getGreeting(langCode) {
  const locale = I18N.getLocale(langCode);
  return locale.hermesDemo?.greeting || '¡Hola! Soy Hermes ⚡';
}

function getFallback(langCode) {
  const locale = I18N.getLocale(langCode);
  return locale.hermesDemo?.fallback || 'Preguntame sobre Byte Wizzard...';
}

function getSuggestions(langCode) {
  const locale = I18N.getLocale(langCode);
  return locale.hermesDemo?.suggestions || ['What is Byte Wizzard?', 'Products'];
}

// State
let KB = [];
let GREETING = '';
let FALLBACK = '';

function rebuildLanguageState(langCode) {
  KB = buildKB(langCode);
  GREETING = getGreeting(langCode);
  FALLBACK = getFallback(langCode);
}

// ═══════════════════════════════════════════════════════════════
// CHAT ENGINE
// ═══════════════════════════════════════════════════════════════

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const suggestionsEl = document.getElementById('suggestions');

let isProcessing = false;

// ─── Find best KB match ───
function findMatch(query) {
  const q = query.toLowerCase().trim();
  const tokens = q.split(/\s+/).filter(t => t.length > 2);

  let best = null;
  let bestScore = 0;

  for (const entry of KB) {
    let score = 0;
    for (const kw of entry.keywords) {
      // Direct substring match
      if (q.includes(kw)) {
        score += kw.length * 3;
      }
      // Token-level match
      for (const token of tokens) {
        if (kw.includes(token) || token.includes(kw)) {
          score += token.length;
        }
      }
    }
    if (score > bestScore) {
      bestScore = score;
      best = entry;
    }
  }

  return bestScore > 5 ? best : null;
}

// ─── Render markdown-like to HTML ───
function renderResponse(text) {
  // Code blocks
  text = text.replace(/`([^`]+)`/g, '<code style="color:#00d488;background:#0a0a0f;padding:1px 5px;border-radius:3px;font-size:0.75rem">$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Newlines
  text = text.replace(/\n/g, '<br>');
  // Bullet lists
  text = text.replace(/• /g, '• ');
  return text;
}

// ─── Add message ───
function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;

  if (type === 'bot') {
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'hermes';
    div.appendChild(label);
    const content = document.createElement('div');
    content.innerHTML = text;
    div.appendChild(content);
  } else {
    div.textContent = text;
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── Typing indicator ───
function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typing-indicator';
  for (let i = 0; i < 3; i++) {
    const span = document.createElement('span');
    div.appendChild(span);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ─── Show suggestions ───
function showSuggestions() {
  suggestionsEl.innerHTML = '';
  const lang = window.__lang || I18N.currentLang || 'es';
  const quick = getSuggestions(lang);
  quick.forEach(text => {
    const btn = document.createElement('button');
    btn.textContent = text;
    btn.addEventListener('click', () => {
      inputEl.value = text;
      handleSend();
    });
    suggestionsEl.appendChild(btn);
  });
}

// ─── Process query ───
function handleSend() {
  const text = inputEl.value.trim();
  if (!text || isProcessing) return;

  inputEl.value = '';
  isProcessing = true;
  sendBtn.disabled = true;
  suggestionsEl.innerHTML = '';

  addMessage(text, 'user');
  showTyping();

  setTimeout(() => {
    hideTyping();

    const match = findMatch(text);

    if (text.toLowerCase().includes('hola') || text.toLowerCase().includes('buenas') || text.toLowerCase().includes('hello') || text.toLowerCase().includes('hi') || text.toLowerCase().includes('olá') || text.toLowerCase().includes('ola')) {
      addMessage(GREETING, 'bot');
    } else if (match) {
      addMessage(renderResponse(match.response()), 'bot');
      // Offer follow-up suggestions based on context
      showSuggestions();
    } else {
      addMessage(renderResponse(FALLBACK), 'bot');
      showSuggestions();
    }

    isProcessing = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }, 600 + Math.random() * 400); // Simulate thinking time
}

// ─── Init ───
function initChat(langCode) {
  rebuildLanguageState(langCode);
  messagesEl.innerHTML = '';
  suggestionsEl.innerHTML = '';
  addMessage(GREETING, 'bot');
  showSuggestions();
}

const initialLang = I18N.currentLang || 'es';
initChat(initialLang);
inputEl.placeholder = __('hermesDemo.inputPlaceholder');
sendBtn.textContent = __('hermesDemo.sendBtn');
inputEl.focus();

// ─── Language change ───
I18N.onLangChange((lang) => {
  initChat(lang);
  inputEl.placeholder = __('hermesDemo.inputPlaceholder');
  sendBtn.textContent = __('hermesDemo.sendBtn');
});

// ─── Events ───
sendBtn.addEventListener('click', handleSend);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSend();
});
</script>
</body>
</html>
